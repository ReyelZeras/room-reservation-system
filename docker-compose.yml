services:
  # --- BANCOS DE DADOS ISOLADOS (Nível 2 exige um por serviço) ---
  user-db:
    image: postgres:15-alpine
    container_name: user-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: user_user
      POSTGRES_PASSWORD: user_pass
    ports:
      - "5441:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_user -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  room-db:
    image: postgres:15-alpine
    container_name: room-db
    environment:
      POSTGRES_DB: room_db
      POSTGRES_USER: room_user
      POSTGRES_PASSWORD: room_pass
    ports:
      - "5442:5432"

  booking-db:
    image: postgres:15-alpine
    container_name: booking-db
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_pass
    ports:
      - "5440:5432"

  # --- MENSAGERIA: RABBITMQ (Notificações - Essencial para o Passo 4) ---
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"   # Porta do Broker
      - "15672:15672" # Painel de Controle (Login: guest/guest)

networks:
  default:
    name: room-res-network