server:
  port: 8761

spring:
  application:
    name: discovery-service

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false # Ele não precisa se registrar nele mesmo
    fetch-registry: false       # Ele não precisa buscar a lista dele mesmo
  server:
    wait-time-in-ms-when-sync-empty: 0

# ==========================================
# CONFIGURAÇÃO DE OBSERVABILIDADE (FASE 3)
# ==========================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}