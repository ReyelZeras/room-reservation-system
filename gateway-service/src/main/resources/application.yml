server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: user-service-route
          uri: lb://user-service
          predicates:
            # CORREÇÃO: Adicionadas as rotas do OAuth2 e Login
            - Path=/api/v1/auth/**, /api/v1/users/**, /oauth2/**, /login/**

        - id: room-service-route
          uri: lb://room-service
          predicates:
            - Path=/api/v1/rooms/**
          filters:
            - AuthenticationFilter

        - id: booking-service-route
          uri: lb://booking-service
          predicates:
            - Path=/api/v1/bookings/**
          filters:
            - AuthenticationFilter

        - id: notification-service-route
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**

        - id: suggestion-service-route
          uri: http://suggestion-service:8086
          predicates:
            - Path=/api/v1/suggestions/**

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "http://zipkin:9411/api/v2/spans"