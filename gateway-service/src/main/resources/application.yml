server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        # A Rota de Usuários/Auth é a única que passa direto (para permitir o Login)
        - id: user-service-route
          uri: lb://user-service
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**

        # Rotas Protegidas - O Filtro de Autenticação vai barrá-las se não houver Token
        - id: room-service-route
          uri: lb://room-service
          predicates:
            - Path=/api/v1/rooms/**
          filters:
            - AuthenticationFilter

        - id: booking-service-route
          uri: lb://booking-service
          predicates:
            - Path=/api/v1/bookings/**
          filters:
            - AuthenticationFilter

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Configuração de Observabilidade e Tracing
management:
  tracing:
    sampling:
      probability: 1.0 # 1.0 significa 100% (Rastreia TODAS as requisições). Em prod, seria 0.1 (10%) para poupar recursos.
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"