server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        # Rota de Usuários/Auth (Acesso Público para Login)
        - id: user-service-route
          uri: lb://user-service
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**

        # Rota de Salas (Protegida pelo Filtro JWT)
        - id: room-service-route
          uri: lb://room-service
          predicates:
            - Path=/api/v1/rooms/**
          filters:
            - AuthenticationFilter

        # Rota de Reservas (Protegida pelo Filtro JWT)
        - id: booking-service-route
          uri: lb://booking-service
          predicates:
            - Path=/api/v1/bookings/**
          filters:
            - AuthenticationFilter

        # NOVO: Rota de Notificações (SSE)
        # Não colocamos o AuthenticationFilter aqui porque o validador de rotas
        # já vai pular a validação para o /stream.
        - id: notification-service-route
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Configurações de Observabilidade (Zipkin)
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"