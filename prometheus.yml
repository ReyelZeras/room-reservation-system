global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'spring-boot-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'gateway-service:8080'
          - 'user-service:8081'
          - 'room-service:8082'
          - 'booking-service:8083'
          - 'audit-service:8084'
          - 'notification-service:8085'

  - job_name: 'quarkus-services'
    metrics_path: '/q/metrics'
    static_configs:
      - targets:
          - 'suggestion-service:8086'