server:
  port: 8083

spring:
  application:
    name: booking-service

  # Forçamos o perfil 'prod' ou 'default' para ignorar o 'dev' antigo que aponta para a porta 5440
  profiles:
    active: default

  datasource:
    # Nova porta 5443 para o booking_db isolado (Microsserviços Nível 2)
    url: jdbc:postgresql://localhost:5440/booking_db
    username: booking_user
    password: booking_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

# Configuração do SpringDoc para documentação
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Configurações de log para facilitar o debug da migração
logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    com.roomres.booking_service: DEBUG