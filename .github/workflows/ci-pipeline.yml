name: Integracao Continua - Microsservicos

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        service: 
          - user-service
          - room-service
          - booking-service
          - audit-service # Ajustado
          - notification-service
          - discovery-service
          - gateway-service

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar o Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Subir Infraestrutura de Apoio (Docker Compose)
      run: docker compose up -d

    - name: Aguardar prontidão dos serviços
      run: sleep 30 # Aumentei para 30s para garantir que o Kafka/Postgres subam

    - name: Build e Testes Automáticos (${{ matrix.service }})
      working-directory: ./${{ matrix.service }}
      # Adicionamos flags para desativar Eureka e Config Client durante os testes de CI
      run: |
        mvn clean verify \
        -Dspring.cloud.discovery.enabled=false \
        -Dspring.cloud.config.enabled=false \
        -Dspring.cloud.service-registry.auto-registration.enabled=false
      
    - name: Desligar Infraestrutura
      if: always()
      run: docker compose down