# A porta que a aplicação usa em produção/desenvolvimento
quarkus.http.port=8086

# Força o Quarkus a usar a porta 8086 também durante os testes (ou porta aleatória definindo 0)
# Isso impede conflitos no CI/CD com o user-service (que usa 8081)
quarkus.http.test-port=8086

# Nome do serviço
quarkus.application.name=suggestion-service