# A porta que a aplicacao usa em producao/desenvolvimento local
quarkus.http.port=8086


# Permite receber conexıes externas (do API Gateway)
quarkus.http.host=0.0.0.0


# CI/CD Hotfix: Define a porta de teste como 0 (Zero).
quarkus.http.test-port=0


# Nome do serviÁo
quarkus.application.name=suggestion-service


# NOVA REGRA: Rota Din‚mica do REST Client
# Se o Docker enviar a vari·vel ROOM_SERVICE_URL, ele usa. Sen„o, assume localhost (para testes locais).
room-api/mp-rest/url=${ROOM_SERVICE_URL:http://localhost:8082}


# ==========================================
# CONFIGURA«√O DE OBSERVABILIDADE E M…TRICAS
# ==========================================
# Dizemos ao Micrometer para etiquetar todas as mÈtricas com application="suggestion-service"
